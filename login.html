<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Governo Digital Moçambique</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column; /* Adicionando flex-direction para posicionar o footer abaixo */
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1rem;
        }

        label, input, button {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
        }

        input {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary-dark);
        }

        .forgot-password {
            display: block;
            margin-top: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Rodapé */
        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 1rem;
            width: 100%;
            position: absolute;
            bottom: 0;
        }

    </style>
</head>
<body>

<div class="form-container">
    <h2>Faça seu login</h2>
    <form>
        <label for="usuario">Usuário:</label>
        <input type="text" id="usuario" name="usuario" required>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>

        <button type="submit">Entrar</button>
    </form>

    <a href="recuperacao.html" class="forgot-password">Esqueceu sua senha?</a>
</div>

<!-- Rodapé -->
<footer>
    <p>&copy; 2025 Governo Digital Moçambique. Todos os direitos reservados.</p>
</footer>

</body>
</html>
