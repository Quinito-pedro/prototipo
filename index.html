<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governo Digital De Moçambique</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            background: url('imagemfundo.jpg') no-repeat center center/cover;
            color: white;
            padding: 2rem 0;
            text-align: center;
            position: relative;
        }

        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .hero {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 2.5rem;
        }

        .hero p {
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        section {
            margin-bottom: 3rem;
            text-align: center;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label, input, select, button {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary-dark);
        }

        footer {
            background: var(--text-dark);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

<header>
    <div class="hero">
        <h1>Governo Digital Moçambique</h1>
        <p>Solicite documentos oficiais online de forma rápida e segura.</p>
        <a href="login.html" class="btn">Fazer Login</a>
    </div>
</header>

<main>
    <section>
        <h2>Solicitação de Documentos</h2>
        <p>Facilidade e rapidez sem precisar enfrentar filas!</p>
        <div class="form-container">
            <form>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="documento">Tipo de Documento:</label>
                <select id="documento" name="documento">
                    <option value="bi">Bilhete de Identidade</option>
                    <option value="passaporte">Passaporte</option>
                    <option value="nuit">NUIT</option>
                    <option value="certidao">Certidão de Nascimento</option>
                </select>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" name="telefone" required>

                <button type="submit">Enviar Pedido</button>
            </form>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2025 Governo Digital Moçambique. Todos os direitos reservados.</p>
</footer>

</body>
</html>
